name: Build and Push Docker Image

on:
  push:
    branches: [ main, master ]
  schedule:
    # 每天北京时间 10:00 (UTC 02:00) 检查上游更新
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 同步上游仓库
        id: sync
        run: |
          # BEpusdt 上游仓库
          UPSTREAM_REPO="https://github.com/v03413/BEpusdt.git"
          UPSTREAM_BRANCH="main"

          git remote add upstream $UPSTREAM_REPO || git remote set-url upstream $UPSTREAM_REPO
          git fetch upstream

          # 检查是否有更新
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse upstream/$UPSTREAM_BRANCH)

          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "发现上游更新，开始合并..."
            git merge upstream/$UPSTREAM_BRANCH --no-edit || {
              echo "合并冲突，尝试使用上游版本..."
              git merge upstream/$UPSTREAM_BRANCH -X theirs --no-edit
            }
            git push origin HEAD
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "已是最新版本，无需更新"
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: 设置 Docker Buildx
        if: steps.sync.outputs.has_updates == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        if: steps.sync.outputs.has_updates == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 登录 GitHub Container Registry
        if: steps.sync.outputs.has_updates == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取 Docker 元数据
        if: steps.sync.outputs.has_updates == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bepusdt
            ghcr.io/${{ github.repository_owner }}/bepusdt
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: 构建并推送 Docker 镜像
        if: steps.sync.outputs.has_updates == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}

      - name: 输出镜像信息
        if: steps.sync.outputs.has_updates == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          echo "### 🐳 Docker 镜像构建成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像标签：**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
