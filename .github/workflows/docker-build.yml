name: Build and Push Docker Image

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 检测当前分支和上游分支
        id: branches
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "当前分支: $CURRENT_BRANCH"
          echo "current_branch=$CURRENT_BRANCH" >> $GITHUB_OUTPUT

          UPSTREAM_REPO="https://github.com/v03413/BEpusdt.git"
          git remote add upstream $UPSTREAM_REPO || git remote set-url upstream $UPSTREAM_REPO
          git fetch upstream

          if git rev-parse upstream/main >/dev/null 2>&1; then
            UPSTREAM_BRANCH="main"
          elif git rev-parse upstream/master >/dev/null 2>&1; then
            UPSTREAM_BRANCH="master"
          else
            echo "找不到上游分支"
            git branch -r
            exit 1
          fi
          echo "上游分支: $UPSTREAM_BRANCH"
          echo "upstream_branch=$UPSTREAM_BRANCH" >> $GITHUB_OUTPUT

      - name: 同步上游仓库
        id: sync
        continue-on-error: true
        run: |
          UPSTREAM_BRANCH="${{ steps.branches.outputs.upstream_branch }}"
          CURRENT_BRANCH="${{ steps.branches.outputs.current_branch }}"

          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse upstream/$UPSTREAM_BRANCH)

          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "发现上游更新，开始合并..."
            if git merge upstream/$UPSTREAM_BRANCH --no-edit 2>&1; then
              echo "合并成功"
            else
              echo "合并冲突，使用上游版本覆盖..."
              git merge --abort || true
              git reset --hard upstream/$UPSTREAM_BRANCH
            fi

            if git push origin $CURRENT_BRANCH 2>&1; then
              echo "推送成功"
            else
              echo "推送失败，但继续构建"
            fi
          else
            echo "已是最新版本"
          fi

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bepusdt
            ghcr.io/${{ github.repository_owner }}/bepusdt
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}

      - name: 输出镜像信息
        run: |
          echo "### 🐳 Docker 镜像构建成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像标签：**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
